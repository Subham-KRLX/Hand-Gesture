<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A browser-based hand gesture drawing app powered by webcam hand tracking."
    />
    <title>Gesture Draw Pro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="Gesture drawing camera">
        <video id="video" playsinline muted></video>
        <canvas id="drawCanvas"></canvas>
        <canvas id="guideCanvas"></canvas>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
